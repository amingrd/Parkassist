<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Banner Export Bridge</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 16px; color: #17263f; }
      textarea { width: 100%; min-height: 260px; font-family: monospace; }
      button { margin-top: 12px; padding: 10px 14px; }
      pre { background: #f5f7fb; padding: 12px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h2>Banner payload</h2>
    <p>Paste the generated <code>plugin-payload.json</code> content from the app to apply text replacements and export PNG variants.</p>
    <textarea id="payload"></textarea>
    <button id="run">Apply and export</button>
    <pre id="status">Waiting for payload.</pre>
    <script>
      const payloadField = document.getElementById("payload");
      const status = document.getElementById("status");
      document.getElementById("run").addEventListener("click", () => {
        try {
          const payload = JSON.parse(payloadField.value);
          parent.postMessage({ pluginMessage: { type: "apply-payload", payload } }, "*");
          status.textContent = "Running export...";
        } catch (error) {
          status.textContent = "Invalid JSON payload.";
        }
      });
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }
        if (message.type === "export-complete") {
          status.textContent = `Exported ${message.variants.length} variants.`;
        }
        if (message.type === "export-error") {
          status.textContent = message.message;
        }
      };
    </script>
  </body>
</html>
